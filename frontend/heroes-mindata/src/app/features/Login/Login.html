<main
  class="relative min-h-screen bg-vanguard-bg text-white overflow-hidden flex items-center justify-center font-label selection:bg-primary-neon selection:text-vanguard-bg vhs-flicker"
>
  <div class="absolute inset-0 pointer-events-none scanlines z-50 opacity-20"></div>
  <div
    class="absolute inset-0 pointer-events-none bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-10 mix-blend-overlay"
  ></div>

  <div
    class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary-neon/10 blur-[140px] rounded-full animate-pulse"
  ></div>
  <div
    class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-secondary-neon/10 blur-[140px] rounded-full animate-pulse"
    style="animation-delay: 2s"
  ></div>

  <div class="relative z-10 w-full max-w-[480px] px-6">
    <header class="mb-16 transform -skew-x-6">
      <div class="flex items-baseline gap-4">
        <h1
          class="text-8xl font-black italic tracking-tighter text-primary-neon drop-shadow-[0_0_15px_rgba(0,242,255,0.5)]"
        >
          VND
        </h1>
        <div class="flex flex-col border-l-2 border-secondary-neon pl-4">
          <span class="text-secondary-neon text-[10px] font-black uppercase tracking-[0.4em]"
            >Auth_Protocol</span
          >
          <span class="text-white/40 text-[9px] uppercase tracking-widest font-bold"
            >Secure Terminal v.4.0.2</span
          >
        </div>
      </div>
    </header>

    <div
      class="bg-vanguard-surface/40 backdrop-blur-3xl p-1 rounded-2xl border border-white/5 shadow-[0_20px_50px_rgba(0,0,0,0.5)]"
    >
      <div class="bg-vanguard-bg/80 p-10 rounded-[calc(1rem-4px)]">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-10">
          <div class="group relative">
            <label
              class="absolute -top-6 left-0 text-[10px] uppercase tracking-[0.3em] text-white/30 group-focus-within:text-primary-neon transition-colors"
            >
              User_Identifier
            </label>
            <input
              formControlName="email"
              type="email"
              class="w-full bg-transparent border-b border-white/10 py-4 text-xl font-display text-primary-neon outline-none transition-all focus:border-primary-neon placeholder:text-white/5"
              placeholder="NAME@DOMAIN.COM"
            />
          </div>

          <div class="group relative">
            <label
              class="absolute -top-6 left-0 text-[10px] uppercase tracking-[0.3em] text-white/30 group-focus-within:text-secondary-neon transition-colors"
            >
              Access_Keyphrase
            </label>
            <input
              formControlName="password"
              type="password"
              class="w-full bg-transparent border-b border-white/10 py-4 text-xl font-display text-secondary-neon outline-none transition-all focus:border-secondary-neon placeholder:text-white/5"
              placeholder="••••••••"
            />
          </div>

          <button
            [disabled]="loginForm.invalid || loading()"
            class="group relative w-full h-16 flex items-center justify-center overflow-hidden transition-all active:scale-95 disabled:grayscale"
          >
            <div
              class="absolute inset-0 bg-gradient-to-r from-primary-neon to-secondary-neon translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-500"
            ></div>
            <div
              class="absolute inset-0 border border-primary-neon group-hover:border-transparent transition-colors"
            ></div>

            <span
              class="relative z-10 font-display font-black uppercase tracking-widest text-primary-neon group-hover:text-vanguard-bg transition-colors"
            >
              {{ loading() ? 'ESTABLISHING LINK...' : 'INITIALIZE SESSION' }}
            </span>
          </button>
        </form>
      </div>
    </div>

    <div class="mt-12 flex justify-between items-end opacity-40 font-label italic">
      <div class="text-[8px] uppercase tracking-tighter">
        <p>System_Status: <span class="text-primary-neon">Online</span></p>
        <p>Local_Time: 11:33:54 UTC-3</p>
      </div>
      <div class="text-right">
        <p class="text-[10px] font-black tracking-widest">MIN_DATA_CORP</p>
        <p class="text-[7px]">PROPERTY OF THE VANGUARD GROUP</p>
      </div>
    </div>
  </div>

  <div class="fixed top-12 right-12 text-primary-neon/20 font-black text-6xl select-none">01</div>
  <div class="fixed bottom-12 left-12 text-secondary-neon/20 font-black text-6xl select-none">
    04
  </div>
</main>
