<main class="h-screen bg-[#0A0E14] flex flex-col p-8 overflow-y-auto custom-scrollbar">
  <header class="mb-8">
    <h1 class="text-5xl font-black text-white uppercase italic">
      Active <span class="text-cyan-400">Vanguard</span>
    </h1>
    <p class="text-slate-500 text-xs tracking-[0.3em]">
      DISPLAYING: {{ limitedHeroes().length }} / TOTAL: {{ heroes().length }}
    </p>
    <app-search-bar></app-search-bar>
  </header>

  <div class="vanguard-grid">
    <div *ngFor="let hero of limitedHeroes(); trackBy: trackByHeroId">
      <app-hero-card [hero]="hero"></app-hero-card>
    </div>
  </div>
</main>
