<div
  class="fixed inset-0 pointer-events-none opacity-20"
  style="
    background-image:
      linear-gradient(to right, rgba(0, 242, 255, 0.1) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0, 242, 255, 0.1) 1px, transparent 1px);
    background-size: 40px 40px;
  "
></div>

<main class="relative h-screen flex flex-col pt-24 px-8 overflow-hidden bg-[#10141a]">
  <header class="mb-10">
    <h1 class="text-6xl font-black uppercase tracking-tighter leading-[90%] mb-2 text-white">
      Active
      <span class="text-cyan-400 drop-shadow-[0_0_15px_rgba(0,242,255,0.4)] italic">Vanguard</span>
    </h1>
    <p class="text-slate-400 tracking-[0.2em] uppercase text-xs font-light">
      Real-time Hero Deployment & Capability Matrix // Units: {{ heroes().length }}
    </p>
  </header>

  <cdk-virtual-scroll-viewport itemSize="380" class="flex-1 custom-scrollbar">
    <div
      *cdkVirtualFor="let hero of heroes(); trackBy: trackByHeroId"
      class="inline-block p-4 align-top w-full sm:w-1/2 lg:w-1/3 2xl:w-1/4"
    >
      <app-hero-card [hero]="hero"></app-hero-card>
    </div>
  </cdk-virtual-scroll-viewport>
</main>
