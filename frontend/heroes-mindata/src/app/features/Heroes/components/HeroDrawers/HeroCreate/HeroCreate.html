<div class="grid grid-cols-1 lg:grid-cols-2 gap-12 p-10 bg-vanguard-bg min-h-screen">
  
  <div class="bg-vanguard-surface/20 p-8 rounded-2xl border border-white/5 backdrop-blur-xl">
    <header class="mb-10">
      <h2 class="text-primary-neon font-black italic text-4xl tracking-tighter uppercase">
        {{ formStructure.config.title }}
      </h2>
      <p class="text-white/40 text-[10px] tracking-[0.3em]">NEURAL_INTERFACE_READY</p>
    </header>

    <form [formGroup]="heroForm" (ngSubmit)="onSubmit()" class="space-y-8">
      @for (field of formStructure.config.fields; track field.name) {
        <div class="group relative">
          <label class="text-[10px] uppercase tracking-[0.3em] text-white/30 group-focus-within:text-primary-neon transition-colors">
            {{ field.label }}
          </label>
          
          @if (field.type === 'select') {
            <select [formControlName]="field.name" 
                    class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-bold text-white outline-none focus:border-primary-neon transition-all appearance-none">
              @for (opt of field.options; track opt.value) {
                <option [value]="opt.value" class="bg-vanguard-bg text-white">{{ opt.label }}</option>
              }
            </select>
          } @else {
            <input
              [formControlName]="field.name"
              [type]="field.type"
              [placeholder]="field.placeholder"
              class="w-full bg-transparent border-b border-white/10 py-3 text-lg font-display text-white outline-none focus:border-primary-neon transition-all placeholder:text-white/5"
            />
          }
        </div>
      }

      <button
        [disabled]="heroForm.invalid"
        class="group relative w-full h-14 flex items-center justify-center overflow-hidden transition-all active:scale-95 disabled:grayscale"
      >
        <div class="absolute inset-0 bg-primary-neon translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-500"></div>
        <div class="absolute inset-0 border border-primary-neon"></div>
        <span class="relative z-10 font-black uppercase tracking-widest text-primary-neon group-hover:text-vanguard-bg transition-colors">
          {{ formStructure.config.actions[0].label }}
        </span>
      </button>
    </form>
  </div>

  <div class="flex flex-col items-center justify-center relative">
    <div class="absolute inset-0 scanlines opacity-10 pointer-events-none"></div>
    
    <div class="w-full max-w-md p-1 bg-gradient-to-b from-white/10 to-transparent rounded-full aspect-square flex items-center justify-center border border-white/5 backdrop-blur-sm">
        <app-hero-chart
          class="w-full h-full" 
          [hero]="liveHeroPreview()"
          [isGood]="isGoodAlignment()"
          (statsChange)="handleRadarChange($event)"
          [editable]="true"
          >
        </app-hero-chart>
    </div>

    <div class="mt-12 text-center">
      <div class="inline-block px-4 py-1 border border-primary-neon/30 mb-4">
        <span class="text-primary-neon text-[10px] font-black animate-pulse">LIVE_SYNC_ACTIVE</span>
      </div>
      <h3 class="text-5xl font-black text-white italic uppercase tracking-tighter drop-shadow-2xl">
        {{ heroForm.get('name')?.value || '---' }}
      </h3>
    </div>
  </div>
</div>
