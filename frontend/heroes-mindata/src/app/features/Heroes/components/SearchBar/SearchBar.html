<div class="flex items-center gap-6 w-full group/container relative">
  <div class="relative flex-1">
    <div class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none z-10">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 text-cyan-500/40 group-focus-within/container:text-cyan-400 transition-colors duration-500"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        />
      </svg>
    </div>

    <input
      type="text"
      #searchInput
      [value]="heroesService.searchQuery()"
      (input)="onSearch(searchInput.value)"
      (focus)="showPredict.set(searchInput.value.length >= 2)"
      (blur)="onBlur()"
      placeholder="SCANNING_NEURAL_DATABASE..."
      class="w-[200px] bg-[#0d1117]/80 border border-white/5 rounded-sm py-4 pl-12 pr-4 text-[10px] font-label text-cyan-100 tracking-[0.2em] outline-none focus:border-cyan-500/30 focus:bg-cyan-500/5 transition-all placeholder:text-slate-700 uppercase"
    />

    @if (showPredict() && heroesService.predictions().length > 0) {
      <div
        class="predict-container absolute top-full left-0 w-full mt-1 bg-[#0d1117]/95 border border-cyan-500/20 backdrop-blur-xl z-50 shadow-[0_10px_30px_rgba(0,0,0,0.5)]"
      >
        @for (pred of heroesService.predictions(); track pred.id; let i = $index) {
          <div
            (click)="selectHero(pred.name)"
            class="flex items-center gap-4 p-3 hover:bg-cyan-500/10 cursor-pointer border-b border-white/5 last:border-none group/item"
            [style.animation-delay]="i * 50 + 'ms'"
          >
            <div class="w-10 h-10 rounded-sm overflow-hidden border border-cyan-500/30 bg-black">
              <img
                [src]="pred.imageSm"
                class="w-full h-full object-cover grayscale group-hover/item:grayscale-0 transition-all duration-500"
              />
            </div>

            <div class="flex flex-col text-left">
              <span
                class="text-[10px] font-black text-slate-400 group-hover/item:text-cyan-400 tracking-[0.1em] uppercase"
              >
                {{ pred.name }}
              </span>
              <span class="text-[7px] text-slate-600 uppercase font-bold tracking-widest">
                UNIT_ID: {{ pred.id.substring(0, 8) }}
              </span>
            </div>
          </div>
        }
      </div>
    }

    <div
      class="absolute top-0 right-0 w-2 h-2 border-t border-r border-cyan-500/30 group-focus-within/container:border-cyan-400"
    ></div>
    <div
      class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-cyan-500/30 group-focus-within/container:border-cyan-400"
    ></div>
  </div>

  <button
    (click)="openCreate()"
    class="relative h-14 px-8 flex items-center gap-3 overflow-hidden transition-all active:scale-95 group/btn"
  >
    <div
      class="absolute inset-0 bg-cyan-500/10 border border-cyan-500/20 -skew-x-12 group-hover/btn:bg-cyan-500/20 group-hover/btn:border-cyan-400/50 transition-all duration-300"
    ></div>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="relative w-5 h-5 text-cyan-400 transition-transform duration-700 group-hover/btn:rotate-180"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
    </svg>
    <span
      class="relative font-label font-black text-[10px] tracking-[0.3em] text-cyan-400 uppercase"
      >Add hero</span
    >
    <div
      class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover/btn:animate-[shimmer_1.5s_infinite]"
    ></div>
  </button>
</div>
