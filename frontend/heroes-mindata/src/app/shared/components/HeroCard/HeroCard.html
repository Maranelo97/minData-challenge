<div
  appGlassParallax
  class="hero-card-master group relative overflow-hidden z-10"
  [class.vanguard-unit]="view().isGood"
  [class.rogue-unit]="!view().isGood"
>
<div class="absolute top-4 left-4 z-50">
  <button 
    (click)="$event.stopPropagation(); openEdit()"
    class="relative group/edit flex items-center p-2 rounded-sm transition-all duration-500 ease-out cursor-pointer overflow-hidden border shadow-[0_0_20px_rgba(0,0,0,0.6)]"
    [class.bg-cyan-500]="view().isGood"
    [class.border-cyan-400]="view().isGood"
    [class.bg-rose-600]="!view().isGood"
    [class.border-rose-400]="!view().isGood"
  >
    <div class="absolute inset-0 bg-white/20 opacity-0 group-hover/edit:opacity-100 transition-opacity duration-300"></div>
    
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white drop-shadow-md z-10 transition-transform duration-500 group-hover/edit:rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
    </svg>

    <span class="max-w-0 opacity-0 group-hover/edit:max-w-[100px] group-hover/edit:opacity-100 group-hover/edit:ml-2 whitespace-nowrap text-[10px] font-black text-white tracking-tighter transition-all duration-500 ease-in-out uppercase z-10">
      Edit Unit
    </span>

    <div 
      class="absolute -inset-1 blur-lg opacity-40 group-hover/edit:opacity-100 transition-all duration-700 -z-10"
      [class.bg-cyan-300]="view().isGood"
      [class.bg-rose-400]="!view().isGood"
    ></div>
  </button>
</div>

  <div
    class="card-corner top-left"
    [class.text-cyan-400]="view().isGood"
    [class.text-rose-500]="!view().isGood"
  ></div>
  <div
    class="card-corner bottom-right"
    [class.text-cyan-400]="view().isGood"
    [class.text-rose-500]="!view().isGood"
  ></div>

  <div class="absolute inset-0 pointer-events-none opacity-[0.15] scanlines z-40 rounded-xl"></div>
  <div
    class="absolute -top-24 -right-24 w-48 h-48 blur-[100px] rounded-full opacity-30 transition-all duration-1000 group-hover:opacity-50"
    [class.bg-cyan-500]="view().isGood"
    [class.bg-rose-600]="!view().isGood"
  ></div>

  <div class="h-64 relative overflow-hidden">
    <img
      [src]="view().imageUrl"
      [alt]="view().name"
      class="w-full h-full object-cover grayscale group-hover:grayscale-0 group-hover:scale-110 transition-all duration-1000 ease-out"
    />

    <div class="absolute inset-0 bg-gradient-to-t from-[#0c0f14] via-[#0c0f14]/20 to-transparent"></div>

    <div
      class="absolute top-4 right-4 px-3 py-1 rounded-sm text-[9px] font-black tracking-[0.2em] uppercase border backdrop-blur-md z-20"
      [class.border-cyan-500/50]="view().isGood"
      [class.text-cyan-400]="view().isGood"
      [class.border-rose-500/50]="!view().isGood"
      [class.text-rose-500]="!view().isGood"
    >
      <span class="relative flex h-2 w-2 mr-2 inline-block">
        <span
          class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
          [class.bg-cyan-400]="view().isGood"
          [class.bg-rose-400]="!view().isGood"
        ></span>
        <span
          class="relative inline-flex rounded-full h-2 w-2"
          [class.bg-cyan-500]="view().isGood"
          [class.bg-rose-500]="!view().isGood"
        ></span>
      </span>
      {{ view().alignmentLabel }}
    </div>
  </div>

  <div class="p-6 pt-0 relative -mt-16">
    <div class="relative min-h-[5.5rem] flex items-end overflow-hidden group/name">
      <h2
        class="hero-name font-black uppercase italic tracking-tighter transition-all duration-500 mb-2 w-full"
        [class.text-4xl]="view().name.length < 15"
        [class.text-2xl]="view().name.length >= 15"
        [class.text-cyan-400]="view().isGood"
        [class.text-rose-500]="!view().isGood"
        [attr.data-text]="view().name"
      >
        {{ view().name }}
      </h2>
      <div class="absolute inset-y-0 right-0 w-12 bg-gradient-to-l from-[#0c0f14] to-transparent pointer-events-none"></div>
    </div>

    <div class="space-y-4 bg-white/5 p-4 rounded-lg border border-white/10 backdrop-blur-xl shadow-2xl">
      <div class="flex-1">
        <div class="flex justify-between text-[9px] font-bold uppercase text-slate-400 mb-2 tracking-[0.2em]">
          <span>{{ view().mainStat.label }} Sync</span>
          <span [class.text-cyan-400]="view().isGood" [class.text-rose-400]="!view().isGood">
            {{ view().mainStat.percentage }}
          </span>
        </div>
        <div class="h-1 w-full bg-black/40 rounded-full overflow-hidden p-[1px]">
          <div
            class="h-full transition-all duration-[2s] relative rounded-full"
            [class.bg-cyan-400]="view().isGood"
            [class.bg-rose-500]="!view().isGood"
            [style.width]="view().mainStat.percentage"
          >
            <div class="absolute inset-0 w-full h-full scanline-bar"></div>
          </div>
        </div>
      </div>

      <div class="flex justify-between items-center pt-2 border-t border-white/5">
        <div class="flex gap-4">
          <div class="text-center">
            <p class="text-[7px] text-slate-500 font-bold uppercase">Str</p>
            <p class="text-xs font-black text-white">{{ view().secondaryStats.str }}</p>
          </div>
          <div class="text-center border-x border-white/10 px-4">
            <p class="text-[7px] text-slate-500 font-bold uppercase">Spd</p>
            <p class="text-xs font-black text-white">{{ view().secondaryStats.spd }}</p>
          </div>
          <div class="text-center">
            <p class="text-[7px] text-slate-500 font-bold uppercase">Pwr</p>
            <p class="text-xs font-black text-white">{{ view().secondaryStats.pwr }}</p>
          </div>
        </div>

        <button
          (click)="$event.stopPropagation(); openDetails()"
          class="identify-btn px-5 py-2 bg-transparent text-[9px] font-black tracking-[0.2em] uppercase transition-all duration-300 border border-white/10 text-white rounded-sm cursor-pointer"
        >
          Identify
        </button>
      </div>
    </div>
  </div>
</div>
