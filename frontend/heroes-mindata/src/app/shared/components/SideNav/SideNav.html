<nav class="sidenav-wrapper" [class.collapsed]="isCollapsed()">
  <div class="toggle-container">
    <button class="toggle-btn" (click)="toggleSideNav()">
      <svg viewBox="0 0 24 24" class="nav-icon" [class.rotated]="!isCollapsed()">
        <path
          d="m13 17 5-5-5-5M6 17l5-5-5-5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
  </div>

  <div class="nav-items">
    <a routerLink="/heroes" routerLinkActive="active" class="nav-item" title="Vanguard Units">
      <svg viewBox="0 0 24 24" class="nav-icon">
        <path
          d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      @if (!isCollapsed()) {
        <span class="nav-label">VANGUARD UNITS</span>
      }
    </a>
    <a routerLink="/ActivityMap" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" class="nav-icon">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
        <path
          d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        />
        <path d="M2 12h20" fill="none" stroke="currentColor" stroke-width="2" />
      </svg>
      @if (!isCollapsed()) {
        <span class="nav-label">ACTIVITY MAP</span>
      }
    </a>
  </div>

  <div class="nav-footer">
    <button class="nav-item logout-btn" (click)="logout()">
      <svg viewBox="0 0 24 24" class="nav-icon">
        <path
          d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      @if (!isCollapsed()) {
        <span class="nav-label">LOGOUT</span>
      }
    </button>

    <div class="status-indicator">
      <div class="dot"></div>
      @if (!isCollapsed()) {
        <span class="status-text">SYSTEM ONLINE</span>
      }
    </div>
  </div>
</nav>
